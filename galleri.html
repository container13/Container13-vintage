<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Se bilder från Container 13 Vintage."
  >

  
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#f8f5ef">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Container13">

<title>Butiken | Container 13 Vintage</title>

  <link
    rel="stylesheet"
    href="css/style.css?v=4.0.0"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >
</head>

<body>

  <!-- Gemensam navigation och statusrad -->
  <div id="site-header"></div>


  <header class="page-header">

    <a
      href="index.html"
      aria-label="Gå till startsidan"
    >
      <img
        src="bilder/logotyp/logo.png"
        class="logo-small"
        alt="Container 13 Vintage"
      >
    </a>

    <h1>Butiken</h1>

    <p>
      Bilder från Container 13 Vintage
    </p>

  </header>


  <main>

    <div
      id="gallery"
      class="gallery"
      aria-live="polite"
      aria-busy="true"
    >
      <p class="gallery-status">
        Hämtar bilder...
      </p>
    </div>

  </main>


  <!-- Förstorad bild -->
  <div
    id="lightbox"
    class="lightbox"
    role="dialog"
    aria-modal="true"
    aria-label="Förstorad bild"
    aria-hidden="true"
  >

    <button
      id="close"
      class="lightbox-close"
      type="button"
      aria-label="Stäng bildvisningen"
    >
      &times;
    </button>

    <button
      class="prev"
      type="button"
      aria-label="Visa föregående bild"
    >
      &#10094;
    </button>

    <img
      id="lightboxImage"
      alt="Förstorad bild från Container 13 Vintage"
    >

    <button
      class="next"
      type="button"
      aria-label="Visa nästa bild"
    >
      &#10095;
    </button>

  </div>


  <!-- Gemensam sidfot -->
  <div id="site-footer"></div>


  <!-- Gemensam meny, statusrad och sidfot -->
  <script
    type="module"
    src="js/layout.js?v=4.0.0"
  ></script>

  <!-- Hämtar bilder från Firebase -->
  <script
    type="module"
    src="js/galleri.js?v=4.0.0"
  ></script>

  <script src="pwa.js" defer></script>
</body>

</html>
